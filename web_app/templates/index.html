<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Recommender - Find Your Perfect Song</title>
    <meta name="description" content="AI-powered music recommendation system. Find similar songs, discover music by mood or context.">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background gradient overlay -->
    <div class="bg-gradient"></div>
    
    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🎵</span>
                <span class="logo-text">Music Recommender</span>
            </div>
            <nav class="nav-links">
                <a href="#" class="nav-link active" data-mode="search">Search</a>
                <a href="#" class="nav-link" data-mode="mood">By Mood</a>
                <a href="#" class="nav-link" data-mode="context">By Activity</a>
            </nav>
        </header>

        <!-- Hero Section -->
        <section class="hero">
            <h1 class="hero-title">Discover Your Next<br><span class="gradient-text">Favorite Song</span></h1>
            <p class="hero-subtitle">AI-powered music recommendations based on your taste</p>
            
            <!-- Search Section -->
            <div class="search-container" id="search-mode">
                <div class="search-box">
                    <input 
                        type="text" 
                        id="searchInput" 
                        class="search-input" 
                        placeholder="Enter a song name..."
                        autocomplete="off"
                    >
                    <input 
                        type="text" 
                        id="artistInput" 
                        class="artist-input" 
                        placeholder="Artist (optional)"
                        autocomplete="off"
                    >
                    <button class="search-btn" id="searchBtn" onclick="handleSearch()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        Search
                    </button>
                </div>
            </div>

            <!-- Mood Section -->
            <div class="filter-container hidden" id="mood-mode">
                <h3 class="filter-title">How are you feeling?</h3>
                <div class="filter-buttons">
                    <button class="mood-btn" data-mood="Happy" onclick="searchByMood('Happy')">
                        <span class="mood-emoji">😊</span>
                        <span>Happy</span>
                    </button>
                    <button class="mood-btn" data-mood="Sad" onclick="searchByMood('Sad')">
                        <span class="mood-emoji">😢</span>
                        <span>Sad</span>
                    </button>
                    <button class="mood-btn" data-mood="Energetic" onclick="searchByMood('Energetic')">
                        <span class="mood-emoji">⚡</span>
                        <span>Energetic</span>
                    </button>
                    <button class="mood-btn" data-mood="Calm" onclick="searchByMood('Calm')">
                        <span class="mood-emoji">😌</span>
                        <span>Calm</span>
                    </button>
                    <button class="mood-btn" data-mood="Angry" onclick="searchByMood('Angry')">
                        <span class="mood-emoji">😠</span>
                        <span>Angry</span>
                    </button>
                </div>
            </div>

            <!-- Context Section -->
            <div class="filter-container hidden" id="context-mode">
                <h3 class="filter-title">What are you doing?</h3>
                <div class="filter-buttons">
                    <button class="context-btn" data-context="Party" onclick="searchByContext('Party')">
                        <span class="context-emoji">🎉</span>
                        <span>Party</span>
                    </button>
                    <button class="context-btn" data-context="Workout" onclick="searchByContext('Workout')">
                        <span class="context-emoji">💪</span>
                        <span>Workout</span>
                    </button>
                    <button class="context-btn" data-context="Study" onclick="searchByContext('Study')">
                        <span class="context-emoji">📚</span>
                        <span>Study</span>
                    </button>
                    <button class="context-btn" data-context="Relax" onclick="searchByContext('Relax')">
                        <span class="context-emoji">🌸</span>
                        <span>Relax</span>
                    </button>
                    <button class="context-btn" data-context="Driving" onclick="searchByContext('Driving')">
                        <span class="context-emoji">🚗</span>
                        <span>Driving</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- Loading Spinner -->
        <div class="loading hidden" id="loading">
            <div class="spinner"></div>
            <p>Finding perfect songs for you...</p>
        </div>

        <!-- Results Section -->
        <section class="results-section hidden" id="resultsSection">
            <div class="results-header">
                <h2 class="results-title" id="resultsTitle">Recommendations</h2>
                <span class="results-count" id="resultsCount"></span>
            </div>
            <div class="results-grid" id="resultsGrid">
                <!-- Song cards will be inserted here -->
            </div>
        </section>

        <!-- YouTube Player Modal -->
        <div class="modal hidden" id="youtubeModal">
            <div class="modal-backdrop" onclick="closeModal()"></div>
            <div class="modal-content">
                <button class="modal-close" onclick="closeModal()">&times;</button>
                <div class="modal-header">
                    <h3 id="modalSongTitle">Now Playing</h3>
                    <p id="modalArtistName"></p>
                </div>
                <div class="youtube-player" id="youtubePlayer">
                    <!-- YouTube iframe will be inserted here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>Powered by Hybrid Music Recommendation Engine</p>
    </footer>

    <script src="/static/js/main.js"></script>
</body>
</html>
